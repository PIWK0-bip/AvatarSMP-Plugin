name: ✨ Feature Request
description: Suggest an idea or new ability for AvatarSMP
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have a cool idea for a new bending power, command, or config option? 
        Let us know below!

  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: e.g., I'm always frustrated when Firebending lacks defensive moves...

  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A detailed description of what you want to see added.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Describe alternatives you've considered
      description: Any alternative solutions or features you've considered.

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mechanics ideas, or screenshots here.