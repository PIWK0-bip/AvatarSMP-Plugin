name: 🐛 Bug Report
description: Report a bug or issue with AvatarSMP
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to fill out this bug report!
  - type: input
    id: server_version
    attributes:
      label: Server Version & Software
      description: e.g., Paper 1.20.4, Purpur 1.20.2
      placeholder: Paper 1.20.4
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps To Reproduce
      description: Steps to reproduce the behavior.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console Errors / Logs
      description: Please paste any error stacktraces from your console here.
